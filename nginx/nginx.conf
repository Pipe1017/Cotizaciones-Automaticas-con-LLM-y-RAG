# opextcm.lat — app principal + API
server {
    listen 80;
    server_name opextcm.lat www.opextcm.lat;

    client_max_body_size 100M;

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # FastAPI docs (opcional, quitar en producción final)
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # React SPA — todos los demás rutas van a index.html
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }
}

# storage.opextcm.lat — MinIO S3 API
server {
    listen 80;
    server_name storage.opextcm.lat;

    client_max_body_size 2G;
    ignore_invalid_headers off;
    proxy_buffering        off;
    proxy_request_buffering off;

    location / {
        proxy_pass              http://minio:9000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout   300;
        proxy_read_timeout      300;
        chunked_transfer_encoding off;
    }
}

# console.opextcm.lat — MinIO Web Console
server {
    listen 80;
    server_name console.opextcm.lat;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://minio:9001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        # WebSocket — necesario para la consola de MinIO
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
